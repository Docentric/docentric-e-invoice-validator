name: Build

on:
  push:
    branches: [ main, develop, feature/** ]
    tags: [ v* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'
  SOLUTION_PATH: 'src/Docentric.EInvoice.Validator.slnx'
  DOCKER_IMAGE: 'docentric-einvoice-validator'

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/WebUI/package-lock.json

    - name: Restore .NET dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Install npm dependencies
      working-directory: src/WebUI
      run: npm ci

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Run tests
      run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Publish artifacts
      run: dotnet publish src/Server/Docentric.EInvoice.Validator.RestServer.csproj --configuration Release --no-build --output ./publish

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: ./publish
        retention-days: 7

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      # Only login when we're going to push (main branch or tags)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_IMAGE }}
        tags: |
          # Tag with branch name (e.g., "main", "develop")
          type=ref,event=branch
          # Tag with version for tags (e.g., "v1.0.0" -> "1.0.0")
          type=semver,pattern={{version}}
          # Tag with major.minor for tags (e.g., "v1.0.0" -> "1.0")
          type=semver,pattern={{major}}.{{minor}}
          # Tag "latest" only for main branch
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./src
        file: ./src/Dockerfile
        # Only push on main branch or version tags
        push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # Use GitHub Actions cache for faster builds
        cache-from: type=gha
        cache-to: type=gha,mode=max
