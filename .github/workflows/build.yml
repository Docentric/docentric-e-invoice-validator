name: Build

on:
  push:
    branches: [ main, develop, feature/** ]
    tags: [ v* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'
  SOLUTION_PATH: 'src/Docentric.EInvoice.Validator.slnx'
  DOCKER_IMAGE: 'docentric/e-invoice-validator'

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.is_release.outputs.value }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Determine if this is a release build (main branch or version tag)
    # Sets artifact retention: 90 days for releases, 7 days for dev builds
    - name: Check if main or tag
      id: is_release
      run: |
        if [[ "${{ github.event_name }}" == "push" && ("${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == refs/tags/v*) ]]; then
          echo "value=true" >> $GITHUB_OUTPUT
          echo "artifact_retention_days=90" >> $GITHUB_OUTPUT
        else
          echo "value=false" >> $GITHUB_OUTPUT
          echo "artifact_retention_days=7" >> $GITHUB_OUTPUT
        fi

    # Setup build environment
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/WebUI/package-lock.json

    # Restore dependencies
    - name: Restore .NET dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Install npm dependencies
      working-directory: src/WebUI
      run: npm ci

    # Build and test
    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Run tests
      run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal
      continue-on-error: true

    # Publish framework-dependent version (requires .NET runtime on target)
    - name: Publish artifacts
      run: dotnet publish src/Server/RestServer.csproj --configuration Release --no-build --output ./publish/rest-server

    # Publish self-contained version with embedded runtime for linux-x64 (only for release builds)
    - name: Publish self-contained artifacts
      if: steps.is_release.outputs.value == 'true'
      run: dotnet publish src/Server/RestServer.csproj --configuration Release --self-contained true --output ./publish/rest-server-self-contained

    # Upload artifacts with retention based on branch
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Docentric.EInvoice.Validator.RestServer
        path: ./publish/rest-server
        retention-days: ${{ steps.is_release.outputs.artifact_retention_days }}

    # Self-contained build only uploaded for release builds
    - name: Upload self-contained build artifacts
      if: steps.is_release.outputs.value == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Docentric.EInvoice.Validator.RestServer-Self-Contained
        path: ./publish/rest-server-self-contained
        retention-days: ${{ steps.is_release.outputs.artifact_retention_days }}

    # Upload source code (only for release builds)
    - name: Upload source code
      if: steps.is_release.outputs.value == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Source
        # Includes everything except build and publish folders
        path: |
          .
          !**/bin/
          !**/obj/
          !**/node_modules/
          !**/.vs/
          !.git/
          !publish/
        include-hidden-files: true # needed for the hidden files and folders (starting with ., like .github, .gitignore, etc.)
        retention-days: ${{ steps.is_release.outputs.artifact_retention_days }}

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Docker with buildx for advanced build features
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Read version from Directory.Build.props to tag the image
    - name: Extract version from Directory.Build.props
      id: version
      run: |
        VERSION=$(grep -oP '<Version>\K[^<]+' src/Directory.Build.props)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    # Login only for release builds (avoids unnecessary auth for dev builds)
    - name: Log in to Docker Hub
      if: needs.build.outputs.is_release == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Generate Docker tags based on version and branch
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_IMAGE }}
        tags: |
          # Tag with version from Directory.Build.props (e.g., "2026.1.0")
          type=raw,value=${{ steps.version.outputs.version }}
          # Tag with branch name (e.g., "main", "develop")
          type=ref,event=branch
          # Tag "latest" only for main branch
          type=raw,value=latest,enable=true

    # Build image for all branches, but only push to Docker Hub for main/tags
    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./src
        file: ./src/Dockerfile
        push: ${{ needs.build.outputs.is_release == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # Use GitHub Actions cache for faster builds
        cache-from: type=gha
        cache-to: type=gha,mode=max
